name: Build macOS (Apple Silicon)

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Generate pyproject.toml for packaging
        run: |
          # Upstream has no pyproject.toml; generate a minimal one for wheel builds.
          VERSION="${GITHUB_REF_NAME#v}"
          # Default version for non-tag builds
          if [[ ! "$GITHUB_REF" =~ ^refs/tags/v ]]; then
            VERSION="0.0.0+g$(git rev-parse --short HEAD)"
          fi
          cat > pyproject.toml << TOML
          [build-system]
          requires = ["setuptools>=68", "wheel"]
          build-backend = "setuptools.build_meta"

          [project]
          name = "mlx-engine"
          version = "${VERSION}"
          description = "Apple MLX LLM Engine for LM Studio"
          requires-python = ">=3.11"
          license = {text = "MIT"}

          [tool.setuptools.packages.find]
          include = ["mlx_engine*"]
          TOML
          # De-indent (the heredoc above preserves leading spaces)
          sed -i '' 's/^          //' pyproject.toml
          echo "--- generated pyproject.toml ---"
          cat pyproject.toml

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools

      - name: Install runtime dependencies
        run: |
          # Install deps; skip mlx/mlx-metal if they fail (CI runner may lack Metal GPU)
          pip install -r requirements.txt || {
            echo "::warning::Full requirements install failed, trying without mlx-metal"
            grep -v 'mlx-metal' requirements.txt | pip install -r /dev/stdin || true
          }

      - name: Run linting
        run: |
          pip install pre-commit
          pre-commit run --all-files || echo "::warning::Lint issues found"

      - name: Run tests (non-model unit tests)
        run: |
          pip install pytest
          # Run only tests that don't require model downloads
          python -m pytest tests/ \
            --ignore=tests/test_text_models.py \
            --ignore=tests/test_vision_models.py \
            --ignore=tests/test_batched_generation.py \
            -x -v 2>&1 || echo "::warning::Some tests failed or were skipped"

      - name: Build wheel
        run: |
          python -m build --wheel --outdir dist/
          ls -lh dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlx-engine-wheel-macos-arm64
          path: dist/*.whl
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: mlx-engine-wheel-macos-arm64
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true
